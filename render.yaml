databases:
  - name: nexus-postgres
    databaseName: nexus_platform
    user: nexus

services:
  - type: web
    name: nexus-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: POSTGRES_HOST
        fromDatabase:
          name: nexus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: nexus-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: nexus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: nexus-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: nexus-postgres
          property: database
      - key: GEMINI_API_KEY
        sync: false
      - key: N8N_API_URL
        value: ""
      - key: N8N_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: "http://localhost:3000,https://nexus-frontend-5thy.onrender.com"
      - key: APP_BASE_URL
        value: "https://nexus-frontend-5thy.onrender.com"
      - key: EVO_API_URL
        sync: false
      - key: EVO_API_KEY
        sync: false
      - key: EVO_WEBHOOK_SECRET
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false

  # Evolution API: deployed separately via Render Dashboard
  # (public repo: https://github.com/EvolutionAPI/evolution-api)
  # See env vars needed: SERVER_PORT, AUTHENTICATION_API_KEY, DATABASE_CONNECTION_URI, etc.

  - type: web
    name: nexus-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
